version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    command: serve

  waf-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
      - LLM_TIMEOUT_SECONDS=120
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5000
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - waf-analyzer
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
    entrypoint: []
    command: ["python", "scripts/test_mcp.py"]
    restart: "no"

volumes:
  ollama_data:
