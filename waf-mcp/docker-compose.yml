version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    command: serve

  waf-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:1.5b
      - LLM_TIMEOUT_SECONDS=120
      - WEB_HOST=0.0.0.0
      - WEB_PORT=8000
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    command: ["python", "web_service.py"]
    volumes:
      - ./logs:/app/logs

volumes:
  ollama_data:
